[package]
name = "regsynth-cli"
version = "0.1.0"
edition = "2021"
description = "CLI interface for RegSynth"

[dependencies]
regsynth-types = { path = "../regsynth-types" }
regsynth-dsl = { path = "../regsynth-dsl" }
regsynth-temporal = { path = "../regsynth-temporal" }
regsynth-encoding = { path = "../regsynth-encoding" }
regsynth-solver = { path = "../regsynth-solver" }
regsynth-pareto = { path = "../regsynth-pareto" }
regsynth-planner = { path = "../regsynth-planner" }
regsynth-certificate = { path = "../regsynth-certificate" }
regsynth-formats = { path = "../regsynth-formats" }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
toml = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
uuid = { workspace = true }
indexmap = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
rand = { workspace = true }
tempfile = "3"

[[bin]]
name = "regsynth"
path = "src/main.rs"

[[bench]]
name = "pareto_synthesis"
harness = false
path = "benches/pareto_synthesis.rs"

[[bench]]
name = "solver_comparison"
harness = false
path = "benches/solver_comparison.rs"

[[bench]]
name = "temporal_unrolling"
harness = false
path = "benches/temporal_unrolling.rs"

[[bench]]
name = "multi_jurisdiction_synthesis"
harness = false
path = "benches/multi_jurisdiction_synthesis.rs"
