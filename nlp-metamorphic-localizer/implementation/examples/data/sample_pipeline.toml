# Sample configuration for nlp-localizer CLI
# Usage: nlp-localizer --config examples/data/sample_pipeline.toml localize --input "The cat chased the mouse."

[pipeline]
stage_names = ["tokenizer", "pos_tagger", "dep_parser", "ner"]
distance_threshold = 0.1
top_k_suspects = 3

[transformations]
enabled_transformations = [
    "Passivization",
    "Clefting",
    "Topicalization",
    "SynonymSubstitution",
    "NegationInsertion",
    "TenseChange",
]
max_per_input = 5

[statistical]
confidence_level = 0.95
bootstrap_resamples = 1000
min_effect_size = 0.2
multiple_testing_correction = "bonferroni"

[calibration]
n_calibration_runs = 30
warmup_runs = 5
outlier_threshold = 3.0

[shrinking]
max_iterations = 100
min_tokens = 2
strategies = ["token_removal", "clause_removal"]

[report]
format = "Json"
include_details = true
max_suspects = 5
