[package]
name = "nlp-metamorphic-localizer"
version = "0.1.0"
edition = "2021"
description = "Causal metamorphic fault localization for multi-stage NLP pipelines"
license = "MIT"
repository = "https://github.com/halleyyoung/nlp-metamorphic-localizer"
homepage = "https://github.com/halleyyoung/nlp-metamorphic-localizer"
readme = "../../README.md"
keywords = ["nlp", "metamorphic-testing", "fault-localization", "testing", "nlp-pipeline"]
categories = ["development-tools::testing", "science", "command-line-utilities"]
rust-version = "1.75"

[[bin]]
name = "nlp-localizer"
path = "src/main.rs"

[[example]]
name = "quick_start"
path = "../../examples/quick_start.rs"

[[example]]
name = "sentiment_analysis"
path = "../../examples/sentiment_analysis.rs"

[[example]]
name = "ner_testing"
path = "../../examples/ner_testing.rs"

[[example]]
name = "translation_quality"
path = "../../examples/translation_quality.rs"

[dependencies]
shared-types = { path = "../shared-types" }
metamorphic-core = { path = "../metamorphic-core" }
nlp-models = { path = "../nlp-models" }
transformations = { path = "../transformations" }
localization = { path = "../localization" }
differential = { path = "../differential" }
statistical-oracle = { path = "../statistical-oracle" }
grammar-checker = { path = "../grammar-checker" }
shrinking = { path = "../shrinking" }
report-gen = { path = "../report-gen" }
evaluation = { path = "../evaluation" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
toml = { workspace = true }
ordered-float = { workspace = true }
indexmap = { workspace = true }
