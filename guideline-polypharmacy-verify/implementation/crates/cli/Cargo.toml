guardpharma-smt-encoder = { workspace = true }
guardpharma-model-checker = { workspace = true }
guardpharma-conflict-detect = { workspace = true }
guardpharma-recommendation = { workspace = true }
guardpharma-significance = { workspace = true }
guardpharma-evaluation = { workspace = true }
guardpharma-fhir-interop = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
log = { workspace = true }
