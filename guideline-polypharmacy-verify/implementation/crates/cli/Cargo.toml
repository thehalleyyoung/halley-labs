[package]
name = "guardpharma-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "guardpharma"
path = "src/main.rs"

[[example]]
name = "diabetes_hypertension"
path = "../../examples/diabetes_hypertension.rs"

[[example]]
name = "dangerous_polypharmacy"
path = "../../examples/dangerous_polypharmacy.rs"

[[example]]
name = "fhir_input"
