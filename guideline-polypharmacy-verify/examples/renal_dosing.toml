# Renal Dosing Verification
#
# Scenario: 81-year-old female with advanced CKD (stage 4), type 2 diabetes,
# and heart failure. Tests guideline conflicts arising from impaired renal
# clearance requiring dose adjustments that conflict across guidelines.

[patient]
id = "RENAL-001"
age = 81
sex = "female"
weight_kg = 55.0
height_cm = 155.0

[[patient.conditions]]
code = "N18.4"
system = "ICD-10-CM"
description = "Chronic kidney disease, stage 4"
onset = "2022-11-01"

[[patient.conditions]]
code = "E11.65"
system = "ICD-10-CM"
description = "Type 2 diabetes with hyperglycemia"
onset = "2010-03-15"

[[patient.conditions]]
code = "I50.22"
system = "ICD-10-CM"
description = "Chronic systolic heart failure"
onset = "2023-02-20"

[[patient.conditions]]
code = "M81.0"
system = "ICD-10-CM"
description = "Age-related osteoporosis without fracture"
onset = "2020-07-10"

[patient.organ_function]
egfr = 22.0
hepatic = "mild_impairment"

[[patient.lab_values]]
code = "LOINC:2160-0"
name = "Creatinine"
value = 2.8
unit = "mg/dL"
date = "2025-01-10"

[[patient.lab_values]]
code = "LOINC:6299-2"
name = "BUN"
value = 45
unit = "mg/dL"
date = "2025-01-10"

[[patient.lab_values]]
code = "LOINC:4548-4"
name = "HbA1c"
value = 8.2
unit = "%"
date = "2025-01-08"

[[patient.lab_values]]
code = "LOINC:2823-3"
name = "Potassium"
value = 5.1
unit = "mEq/L"
date = "2025-01-10"

[[medications]]
drug = "metformin"
rxnorm = "6809"
dose_mg = 1000.0
frequency = "BID"
route = "oral"
indication = "T2DM glycemic control"

[[medications]]
drug = "lisinopril"
rxnorm = "29046"
dose_mg = 20.0
frequency = "daily"
route = "oral"
indication = "HF, nephroprotection"

[[medications]]
drug = "spironolactone"
rxnorm = "9997"
dose_mg = 25.0
frequency = "daily"
route = "oral"
indication = "HF mortality benefit"

[[medications]]
drug = "digoxin"
rxnorm = "3407"
dose_mg = 0.125
frequency = "daily"
route = "oral"
indication = "HF rate control"

[[medications]]
drug = "alendronate"
rxnorm = "3002"
dose_mg = 70.0
frequency = "weekly"
route = "oral"
indication = "Osteoporosis"

[[medications]]
drug = "gabapentin"
rxnorm = "25480"
dose_mg = 300.0
frequency = "TID"
route = "oral"
indication = "Neuropathic pain"

[verification]
time_horizon_days = 365
tier1_timeout_secs = 15
tier2_timeout_secs = 240
significance_threshold = "moderate"

# Expected findings:
# 1. CRITICAL: Metformin contraindicated at eGFR < 30 → lactic acidosis risk
#    ADA guideline requires discontinuation below eGFR 30; patient at eGFR 22
# 2. CRITICAL: Spironolactone + lisinopril + eGFR 22 → severe hyperkalemia
#    K+ already 5.1 mEq/L; dual RAAS blockade with CKD is contraindicated
# 3. MAJOR: Digoxin requires dose reduction at eGFR < 30 (0.0625 mg/day)
#    Narrow therapeutic index drug; renal elimination reduced 60%
# 4. MAJOR: Gabapentin 300mg TID exceeds max dose for eGFR 22 (max 300mg/day)
#    Renally eliminated; accumulation → CNS toxicity at standard doses
# 5. MODERATE: Alendronate use cautioned at eGFR < 35
#    KDIGO recommends against bisphosphonates in severe CKD
