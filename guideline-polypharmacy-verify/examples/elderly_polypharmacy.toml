# Elderly Patient Polypharmacy Verification
#
# Scenario: 78-year-old female with atrial fibrillation, CKD stage 3b,
# hypertension, and hyperlipidemia. On 6 medications across 3 guidelines.
# This is a high-risk polypharmacy scenario common in Medicare beneficiaries.

[patient]
id = "ELDER-001"
age = 78
sex = "female"
weight_kg = 62.0
height_cm = 160.0

[[patient.conditions]]
code = "I48.91"
system = "ICD-10-CM"
description = "Atrial fibrillation, unspecified"
onset = "2019-03-15"

[[patient.conditions]]
code = "N18.3b"
system = "ICD-10-CM"
description = "Chronic kidney disease, stage 3b"
onset = "2020-08-22"

[[patient.conditions]]
code = "I10"
system = "ICD-10-CM"
description = "Essential hypertension"
onset = "2015-01-10"

[[patient.conditions]]
code = "E78.5"
system = "ICD-10-CM"
description = "Hyperlipidemia, unspecified"
onset = "2016-06-01"

[patient.organ_function]
egfr = 38.0
hepatic = "normal"

[[medications]]
drug = "apixaban"
rxnorm = "1364430"
dose_mg = 5.0
frequency = "BID"
route = "oral"
indication = "AF stroke prevention"

[[medications]]
drug = "diltiazem"
rxnorm = "3443"
dose_mg = 240.0
frequency = "daily"
route = "oral"
indication = "Rate control AF + HTN"

[[medications]]
drug = "atorvastatin"
rxnorm = "83367"
dose_mg = 40.0
frequency = "daily"
route = "oral"
indication = "Hyperlipidemia"

[[medications]]
drug = "lisinopril"
rxnorm = "29046"
dose_mg = 10.0
frequency = "daily"
route = "oral"
indication = "HTN, CKD nephroprotection"

[[medications]]
drug = "metoprolol"
rxnorm = "6918"
dose_mg = 50.0
frequency = "BID"
route = "oral"
indication = "Rate control AF"

[[medications]]
drug = "furosemide"
rxnorm = "4603"
dose_mg = 20.0
frequency = "daily"
route = "oral"
indication = "Volume overload CKD"

[verification]
time_horizon_days = 365
tier1_timeout_secs = 10
tier2_timeout_secs = 120
significance_threshold = "moderate"

# Expected findings:
# 1. Diltiazem inhibits CYP3A4, increasing apixaban exposure → bleeding risk
#    Severity: Major. Mechanism: CYP3A4 competitive inhibition (Ki = 25 μM)
# 2. Diltiazem + atorvastatin: CYP3A4 inhibition increases statin exposure
#    Severity: Moderate. Mechanism: shared CYP3A4 metabolism
# 3. Renal dose adjustment needed: apixaban 2.5mg BID for eGFR < 50
#    Severity: Critical. Mechanism: reduced renal clearance at eGFR 38
