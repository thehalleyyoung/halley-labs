# Anticoagulant Interaction Verification
#
# Scenario: 65-year-old male with AF and new DVT diagnosis.
# Transition from warfarin to DOAC complicated by concurrent amiodarone.
# Tests CYP2C9/3A4 inhibition cascade and P-glycoprotein interactions.

[patient]
id = "ANTICOAG-001"
age = 65
sex = "male"
weight_kg = 85.0
height_cm = 178.0

[[patient.conditions]]
code = "I48.0"
system = "ICD-10-CM"
description = "Paroxysmal atrial fibrillation"
onset = "2021-06-01"

[[patient.conditions]]
code = "I82.401"
system = "ICD-10-CM"
description = "Acute DVT of unspecified deep vein of right lower extremity"
onset = "2025-01-05"

[patient.organ_function]
egfr = 72.0
hepatic = "normal"

[[medications]]
drug = "warfarin"
rxnorm = "11289"
dose_mg = 5.0
frequency = "daily"
route = "oral"
indication = "AF anticoagulation"

[[medications]]
drug = "amiodarone"
rxnorm = "703"
dose_mg = 200.0
frequency = "daily"
route = "oral"
indication = "AF rhythm control"

[[medications]]
drug = "rivaroxaban"
rxnorm = "1114195"
dose_mg = 15.0
frequency = "BID"
route = "oral"
indication = "DVT treatment (bridging)"

[[medications]]
drug = "omeprazole"
rxnorm = "7646"
dose_mg = 20.0
frequency = "daily"
route = "oral"
indication = "GI prophylaxis"

[verification]
time_horizon_days = 90
tier1_timeout_secs = 10
tier2_timeout_secs = 180
significance_threshold = "major"

# Expected findings:
# 1. CRITICAL: Dual anticoagulation (warfarin + rivaroxaban) → extreme bleeding risk
#    No CYP mechanism needed — pharmacodynamic interaction
# 2. MAJOR: Amiodarone inhibits CYP2C9 → warfarin AUC increases 40-60%
#    INR elevation risk; requires dose reduction to ~2.5 mg/day
# 3. MAJOR: Amiodarone inhibits CYP3A4 and P-gp → rivaroxaban exposure increases
#    Bleeding risk with DOAC + strong CYP3A4 inhibitor
# 4. MODERATE: Omeprazole induces CYP1A2, minor effect on amiodarone metabolism
