[package]
name = "sonitype-cli"
version.workspace = true
edition.workspace = true
description = "Command-line interface for the SoniType sonification compiler"

[[bin]]
name = "sonitype"
path = "src/main.rs"

[dependencies]
sonitype-core = { workspace = true }
sonitype-dsl = { workspace = true }
sonitype-psychoacoustic = { workspace = true }
sonitype-optimizer = { workspace = true }
sonitype-ir = { workspace = true }
sonitype-codegen = { workspace = true }
sonitype-renderer = { workspace = true }
sonitype-stdlib = { workspace = true }
sonitype-accessibility = { workspace = true }
sonitype-streaming = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "sonification_quality"
harness = false
