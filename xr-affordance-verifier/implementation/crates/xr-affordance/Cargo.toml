[package]
name = "xr-affordance"
version = "0.1.0"
edition = "2021"

[dependencies]
xr-types = { path = "../xr-types" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
nalgebra = { version = "0.32", features = ["serde-serialize"] }
rand = "0.8"
rand_distr = "0.4"
ordered-float = { version = "4", features = ["serde"] }
rayon = "1.8"
