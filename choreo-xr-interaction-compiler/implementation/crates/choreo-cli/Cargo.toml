[package]
name = "choreo-cli"
description = "Command-line interface for the Choreo XR interaction compiler"
version.workspace = true
edition.workspace = true

[[bin]]
name = "choreo"
path = "src/main.rs"

[dependencies]
choreo-types = { path = "../choreo-types" }
choreo-dsl = { path = "../choreo-dsl" }
choreo-spatial = { path = "../choreo-spatial" }
choreo-ec = { path = "../choreo-ec" }
choreo-automata = { path = "../choreo-automata" }
choreo-cegar = { path = "../choreo-cegar" }
choreo-codegen = { path = "../choreo-codegen" }
choreo-gesture = { path = "../choreo-gesture" }
choreo-conflict = { path = "../choreo-conflict" }
choreo-runtime = { path = "../choreo-runtime" }
choreo-simulator = { path = "../choreo-simulator" }
choreo-formats = { path = "../choreo-formats" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
