[package]
name = "sim-cli"
version.workspace = true
edition.workspace = true
description = "Command-line interface for the ConservationLint auditor"

[[bin]]
name = "conservation-lint"
path = "src/main.rs"

[[example]]
name = "nbody_audit"
path = "../examples/nbody_audit.rs"

[[example]]
name = "fluid_audit"
path = "../examples/fluid_audit.rs"

[[example]]
name = "electromagnetic_audit"
path = "../examples/electromagnetic_audit.rs"

[[example]]
name = "benchmark_integrators"
path = "../examples/benchmark_integrators.rs"

[dependencies]
sim-types = { path = "../sim-types" }
sim-laws = { path = "../sim-laws" }
sim-detect = { path = "../sim-detect" }
sim-analysis = { path = "../sim-analysis" }
sim-monitor = { path = "../sim-monitor" }
sim-integrator = { path = "../sim-integrator" }
sim-trace = { path = "../sim-trace" }
sim-eval = { path = "../sim-eval" }
sim-repair = { path = "../sim-repair" }
conservation-types = { path = "../conservation-types" }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
