[package]
name = "conservation-benchmarks"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
sim-types = { path = "../sim-types" }
sim-eval = { path = "../sim-eval" }
sim-laws = { path = "../sim-laws" }
sim-detect = { path = "../sim-detect" }
sim-monitor = { path = "../sim-monitor" }
sim-integrator = { path = "../sim-integrator" }
conservation-analysis = { path = "../conservation-analysis" }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bin]]
name = "real_benchmark"
path = "src/real_benchmark.rs"

[[bench]]
name = "conservation_bench"
harness = false
path = "benches/conservation_bench.rs"
