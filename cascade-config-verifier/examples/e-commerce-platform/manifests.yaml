# E-Commerce Platform Example
#
# 8-service e-commerce topology with multiple cascade risk patterns:
#
#   api-gateway → product-service → inventory-db
#   api-gateway → cart-service → redis-cache
#   api-gateway → payment-service → external-payment-gw
#   api-gateway → order-service → order-db
#   order-service → payment-service  (cross-dependency)
#
# Risks:
#   1. Retry amplification: gateway→order→payment→ext-gw = (1+3)(1+2)(1+3) = 48×
#   2. Timeout chain: gateway deadline 30s < worst-case path ~52s
#   3. Fan-in on payment-service from both api-gateway and order-service
#   4. Fragile external gateway with aggressive retries
#
# Run: cascade-verify check examples/e-commerce-platform/

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
    team: platform
  annotations:
    cascade-verify/capacity: "5000"
    cascade-verify/baseline-load: "2000"
    cascade-verify/deadline-ms: "30000"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v2.1.0
        istio.io/rev: stable
    spec:
      containers:
      - name: api-gateway
        image: ecommerce/api-gateway:2.1.0
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
  labels:
    app: product-service
    team: catalog
  annotations:
    cascade-verify/capacity: "3000"
    cascade-verify/baseline-load: "800"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
        version: v1.4.2
    spec:
      containers:
      - name: product-service
        image: ecommerce/product-service:1.4.2
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
  namespace: ecommerce
  labels:
    app: inventory-db
    team: catalog
  annotations:
    cascade-verify/capacity: "1500"
    cascade-verify/baseline-load: "400"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
    spec:
      containers:
      - name: inventory-db
        image: postgres:15.4
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: inventory
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce
  labels:
    app: cart-service
    team: checkout
  annotations:
    cascade-verify/capacity: "4000"
    cascade-verify/baseline-load: "1500"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        version: v1.2.0
    spec:
      containers:
      - name: cart-service
        image: ecommerce/cart-service:1.2.0
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: ecommerce
  labels:
    app: redis-cache
    team: checkout
  annotations:
    cascade-verify/capacity: "10000"
    cascade-verify/baseline-load: "3000"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis-cache
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
  labels:
    app: payment-service
    team: payments
  annotations:
    cascade-verify/capacity: "800"
    cascade-verify/baseline-load: "300"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        version: v3.0.1
    spec:
      containers:
      - name: payment-service
        image: ecommerce/payment-service:3.0.1
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-payment-gw
  namespace: ecommerce
  labels:
    app: external-payment-gw
    team: payments
  annotations:
    cascade-verify/capacity: "200"
    cascade-verify/baseline-load: "100"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-payment-gw
  template:
    metadata:
      labels:
        app: external-payment-gw
    spec:
      containers:
      - name: external-payment-gw
        image: ecommerce/payment-gateway-adapter:1.0.0
        ports:
        - containerPort: 8443
          name: https
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
    team: orders
  annotations:
    cascade-verify/capacity: "1200"
    cascade-verify/baseline-load: "500"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: v2.3.0
    spec:
      containers:
      - name: order-service
        image: ecommerce/order-service:2.3.0
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: ecommerce
  labels:
    app: order-db
    team: orders
  annotations:
    cascade-verify/capacity: "1000"
    cascade-verify/baseline-load: "300"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
      - name: order-db
        image: postgres:15.4
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: orders
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
---
# Istio VirtualService: api-gateway → product-service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-product
  namespace: ecommerce
spec:
  hosts:
  - product-service
  http:
  - retries:
      attempts: 2
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure
    timeout: 15s
    route:
    - destination:
        host: product-service
        port:
          number: 8080
---
# Istio VirtualService: product-service → inventory-db
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-to-inventory
  namespace: ecommerce
spec:
  hosts:
  - inventory-db
  http:
  - retries:
      attempts: 2
      perTryTimeout: 3s
      retryOn: 5xx,connect-failure
    timeout: 10s
    route:
    - destination:
        host: inventory-db
        port:
          number: 5432
---
# Istio VirtualService: api-gateway → cart-service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-cart
  namespace: ecommerce
spec:
  hosts:
  - cart-service
  http:
  - retries:
      attempts: 2
      perTryTimeout: 3s
      retryOn: 5xx,reset,connect-failure
    timeout: 10s
    route:
    - destination:
        host: cart-service
        port:
          number: 8080
---
# Istio VirtualService: cart-service → redis-cache
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cart-to-redis
  namespace: ecommerce
spec:
  hosts:
  - redis-cache
  http:
  - retries:
      attempts: 3
      perTryTimeout: 1s
      retryOn: 5xx,reset,connect-failure,refused-stream
    timeout: 5s
    route:
    - destination:
        host: redis-cache
        port:
          number: 6379
---
# Istio VirtualService: api-gateway → payment-service (direct path)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-payment
  namespace: ecommerce
spec:
  hosts:
  - payment-service
  http:
  - retries:
      attempts: 3
      perTryTimeout: 8s
      retryOn: 5xx,reset,connect-failure,gateway-error
    timeout: 35s
    route:
    - destination:
        host: payment-service
        port:
          number: 8080
---
# Istio VirtualService: payment-service → external-payment-gw
# DANGER: aggressive retries against a slow external gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-to-external-gw
  namespace: ecommerce
spec:
  hosts:
  - external-payment-gw
  http:
  - retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,gateway-error,retriable-4xx
    timeout: 45s
    route:
    - destination:
        host: external-payment-gw
        port:
          number: 8443
---
# Istio VirtualService: api-gateway → order-service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-order
  namespace: ecommerce
spec:
  hosts:
  - order-service
  http:
  - retries:
      attempts: 3
      perTryTimeout: 8s
      retryOn: 5xx,reset,connect-failure
    timeout: 35s
    route:
    - destination:
        host: order-service
        port:
          number: 8080
---
# Istio VirtualService: order-service → order-db
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-to-db
  namespace: ecommerce
spec:
  hosts:
  - order-db
  http:
  - retries:
      attempts: 2
      perTryTimeout: 3s
      retryOn: 5xx,connect-failure
    timeout: 10s
    route:
    - destination:
        host: order-db
        port:
          number: 5432
---
# Istio VirtualService: order-service → payment-service (cross-dependency)
# This creates fan-in on payment-service from both gateway and order-service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-to-payment
  namespace: ecommerce
spec:
  hosts:
  - payment-service
  http:
  - retries:
      attempts: 2
      perTryTimeout: 8s
      retryOn: 5xx,reset,connect-failure,gateway-error
    timeout: 25s
    route:
    - destination:
        host: payment-service
        port:
          number: 8080
---
# Istio DestinationRule: circuit breaker on external-payment-gw
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: external-payment-gw-circuit-breaker
  namespace: ecommerce
spec:
  host: external-payment-gw
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 100
        http2MaxRequests: 100
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
