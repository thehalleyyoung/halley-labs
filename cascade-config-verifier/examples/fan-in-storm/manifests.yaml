        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
---
# Each frontend → shared-api with 3 retries
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend-a-to-shared-api
  namespace: fan-in-demo
spec:
  hosts:
  - shared-api
  http:
  - match:
    - sourceLabels:
        app: frontend-a
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: 5xx,reset,connect-failure
    timeout: 15s
    route:
    - destination:
        host: shared-api
        port:
          number: 8080
---
