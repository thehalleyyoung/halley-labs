# Fan-In Storm Example
#
# Topology demonstrating fan-in amplification: 6 independent frontend services
# all call a single shared backend (shared-api), each with retries. The backend
# then calls a database with its own retries.
#
#   frontend-a ──┐
#   frontend-b ──┤
#   frontend-c ──┼──→ shared-api ──→ database
#   frontend-d ──┤
#   frontend-e ──┤
#   frontend-f ──┘
#
# Risks:
#   1. Fan-in amplification: each frontend retries 3× → shared-api receives
#      6 × (1+3) = 24× baseline load under failure
#   2. shared-api retries 2× to database → database sees 24 × (1+2) = 72×
#   3. Database capacity (500 rps) < 72 × 100 rps = 7200 rps worst-case
#
# Run: cascade-verify check examples/fan-in-storm/

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-a
  namespace: fan-in-demo
  labels:
    app: frontend-a
    role: frontend
  annotations:
    cascade-verify/capacity: "1000"
    cascade-verify/baseline-load: "100"
    cascade-verify/deadline-ms: "15000"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-a
  template:
    metadata:
      labels:
        app: frontend-a
        role: frontend
    spec:
      containers:
      - name: frontend-a
        image: frontend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
---
