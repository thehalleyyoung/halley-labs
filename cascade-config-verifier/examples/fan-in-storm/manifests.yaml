---
# shared-api → database with 2 retries
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: shared-api-to-database
  namespace: fan-in-demo
spec:
  hosts:
  - database
  http:
  - retries:
      attempts: 2
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure
    timeout: 8s
    route:
    - destination:
        host: database
        port:
          number: 5432
---
# DestinationRule: circuit breaker on shared-api to limit fan-in damage
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: shared-api-circuit-breaker
  namespace: fan-in-demo
spec:
  host: shared-api
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 200
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# DestinationRule: circuit breaker on database to prevent total overload
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: database-circuit-breaker
  namespace: fan-in-demo
spec:
  host: database
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 25
        http2MaxRequests: 50
    outlierDetection:
      consecutive5xxErrors: 2
      interval: 5s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
