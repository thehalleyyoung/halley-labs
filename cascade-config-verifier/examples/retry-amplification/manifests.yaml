# Retry Amplification Example
#
# Three-service chain where retry policies compound multiplicatively.
# gateway → api-server → database
# Amplification: (1+3) × (1+3) = 16× on database
#
# Run: cascade-verify check examples/retry-amplification/

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: demo
  labels:
    app: gateway
  annotations:
    cascade-verify/capacity: "1000"
    cascade-verify/baseline-load: "100"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: demo
  labels:
    app: api-server
  annotations:
    cascade-verify/capacity: "500"
    cascade-verify/baseline-load: "80"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: api-server
        image: api-server:latest
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: demo
  labels:
    app: database
  annotations:
    cascade-verify/capacity: "200"
    cascade-verify/baseline-load: "50"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: database
        image: postgres:15
        ports:
        - containerPort: 5432
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-api
  namespace: demo
spec:
  hosts:
  - api-server
  http:
  - retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure
    timeout: 45s
    route:
    - destination:
        host: api-server
        port:
          number: 8080
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-to-database
  namespace: demo
spec:
  hosts:
  - database
  http:
  - retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure
    timeout: 25s
    route:
    - destination:
        host: database
        port:
          number: 5432
