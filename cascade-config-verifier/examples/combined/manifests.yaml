# Combined Example: Retry Amplification + Timeout Chain + Fan-in
#
# A realistic 6-service topology with multiple cascade risks:
#
#   ingress → api-gateway → [user-service, order-service] → payment-service → database
#
# Risks:
#   1. Retry amplification: ingress→api→order→payment = (1+2)(1+3)(1+3) = 48×
#   2. Timeout chain: ingress deadline 60s < worst-case 78s
#   3. Fan-in at payment-service: user-service AND order-service both call it
#
# Run: cascade-verify check examples/combined/ --tier 2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "5000"
    cascade-verify/deadline-ms: "60000"
    cascade-verify/baseline-load: "1000"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      containers:
      - name: ingress
        image: envoyproxy/envoy:v1.28
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "3000"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "1500"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "1000"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "500"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: payment-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: ecommerce
  annotations:
    cascade-verify/capacity: "300"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: database
        image: postgres:15
---
# Retry policies via Istio VirtualServices
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ingress-to-api
  namespace: ecommerce
spec:
  hosts: [api-gateway]
  http:
  - retries:
      attempts: 2
      perTryTimeout: 15s
    timeout: 60s
    route:
    - destination:
        host: api-gateway
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-to-users
  namespace: ecommerce
spec:
  hosts: [user-service]
  http:
  - retries:
      attempts: 2
      perTryTimeout: 5s
    timeout: 20s
    route:
    - destination:
        host: user-service
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-to-orders
  namespace: ecommerce
spec:
  hosts: [order-service]
  http:
  - retries:
      attempts: 3
      perTryTimeout: 8s
    timeout: 35s
    route:
    - destination:
        host: order-service
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: users-to-payment
  namespace: ecommerce
spec:
  hosts: [payment-service]
  http:
  - retries:
      attempts: 2
      perTryTimeout: 5s
    timeout: 20s
    route:
    - destination:
        host: payment-service
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: orders-to-payment
  namespace: ecommerce
spec:
  hosts: [payment-service]
  http:
  - retries:
      attempts: 3
      perTryTimeout: 5s
    timeout: 25s
    route:
    - destination:
        host: payment-service
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-to-db
  namespace: ecommerce
spec:
  hosts: [database]
  http:
  - retries:
      attempts: 3
      perTryTimeout: 3s
    timeout: 15s
    route:
    - destination:
        host: database
