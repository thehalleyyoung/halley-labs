# KubeLinter vs CascadeVerify Comparison Baseline
#
# This config contains issues that KubeLinter catches AND issues that only
# CascadeVerify catches. It demonstrates the complementary nature of the tools.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ WHAT KUBELINTER FINDS (per-resource linting):                         │
# │  • Missing resource limits on some containers                         │
# │  • Missing liveness/readiness probes                                  │
# │  • Running as root                                                    │
# │  • Missing security context                                           │
# │  • No anti-affinity rules                                             │
# │                                                                       │
# │ WHAT KUBELINTER MISSES (cross-service cascade risks):                 │
# │  ✗ Retry amplification across the 4-service chain (4^3 = 64×)        │
# │  ✗ Timeout budget violations (sum of worst-case exceeds 60s SLA)      │
# │  ✗ Fan-in storm on the database from two upstream paths               │
# │  ✗ Cascading failure propagation patterns                             │
# │                                                                       │
# │ WHAT CASCADE-VERIFY FINDS (that KubeLinter doesn't):                  │
# │  ✓ 64× retry amplification on db from gateway path                   │
# │  ✓ Timeout budget: 4×10s + 4×5s + 4×3s = 72s > 60s SLA             │
# │  ✓ Fan-in: db receives retried traffic from both api-a and api-b     │
# │  ✓ Blast radius: gateway failure cascades to all 3 downstream svcs    │
# └─────────────────────────────────────────────────────────────────────────┘

# --- Service: gateway ---
# KubeLinter: PASS (has limits, probes, security context)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: comparison
  labels:
    app: gateway
  annotations:
    cascade-verify/capacity: "2000"
    cascade-verify/baseline-load: "200"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: myregistry/gateway:v1.2.0
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true

# --- Service: api-a ---
# KubeLinter: WARN — missing resource limits, no probes, no security context
# (These are the issues KubeLinter excels at finding)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-a
  namespace: comparison
  labels:
    app: api-a
  annotations:
    cascade-verify/capacity: "800"
    cascade-verify/baseline-load: "100"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-a
  template:
    metadata:
      labels:
        app: api-a
    spec:
      containers:
      - name: api-a
        image: myregistry/api-a:latest
        # KubeLinter: WARN — using :latest tag
        ports:
        - containerPort: 8080
        # KubeLinter: WARN — no resource limits
        # KubeLinter: WARN — no liveness probe
        # KubeLinter: WARN — no readiness probe
        # KubeLinter: WARN — no security context

# --- Service: api-b ---
# KubeLinter: WARN — missing readiness probe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-b
  namespace: comparison
  labels:
    app: api-b
  annotations:
    cascade-verify/capacity: "600"
    cascade-verify/baseline-load: "80"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-b
  template:
    metadata:
      labels:
        app: api-b
    spec:
      containers:
      - name: api-b
        image: myregistry/api-b:v2.0.0
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        # KubeLinter: WARN — no readiness probe

# --- Service: database ---
# KubeLinter: WARN — running as root, no security context
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: comparison
  labels:
    app: database
  annotations:
    cascade-verify/capacity: "200"
    cascade-verify/baseline-load: "50"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: database
        image: postgres:15
        ports:
        - containerPort: 5432
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
        # KubeLinter: WARN — no security context (defaults to root)

# --- Retry/Timeout Policies ---
# These are INVISIBLE to KubeLinter but create dangerous cascade patterns
# that CascadeVerify detects.

# CascadeVerify: CRITICAL — gateway→api-a with 3 retries creates 4× amplification
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-api-a
  namespace: comparison
spec:
  hosts:
  - api-a
  http:
  - retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure
    timeout: 45s
    route:
    - destination:
        host: api-a
        port:
          number: 8080

# CascadeVerify: CRITICAL — gateway→api-b with 3 retries, PLUS api-b→database
# creates a second amplification path to the database
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-to-api-b
  namespace: comparison
spec:
  hosts:
  - api-b
  http:
  - retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure
    timeout: 45s
    route:
    - destination:
        host: api-b
        port:
          number: 8080

# CascadeVerify: CRITICAL — api-a→database with 3 retries
# Combined path: gateway→api-a→database = (1+3)×(1+3) = 16× on database
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-a-to-database
  namespace: comparison
spec:
  hosts:
  - database
  http:
  - retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure
    timeout: 25s
    route:
    - destination:
        host: database
        port:
          number: 5432

# CascadeVerify: CRITICAL — api-b→database with 3 retries
# Combined path: gateway→api-b→database = (1+3)×(1+3) = 16× on database
# Fan-in: database gets 16× from path A + 16× from path B = 32× total
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-b-to-database
  namespace: comparison
spec:
  hosts:
  - database
  http:
  - retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: 5xx,reset,connect-failure
    timeout: 15s
    route:
    - destination:
        host: database
        port:
          number: 5432
