# --- VirtualServices (retry/timeout policies) ---

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: svc-0-to-svc-1
  namespace: bench-chain10
spec:
  hosts:
  - svc-1
  http:
  - retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure
    timeout: 20s
    route:
    - destination:
        host: svc-1
        port:
          number: 8080
---
