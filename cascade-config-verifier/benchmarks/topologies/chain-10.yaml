# CascadeVerify Benchmark — 10-Service Linear Chain
#
# Topology: svc-0 → svc-1 → svc-2 → … → svc-9
# Each hop: 3 retries, 5s per-try timeout, 20s overall timeout
# Amplification at svc-9: (1+3)^9 = 262,144×
#
# Tests basic retry amplification scaling along a linear path.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-0
  namespace: bench-chain10
  labels:
    app: svc-0
    topology: chain-10
    tier: "0"
  annotations:
    cascade-verify/capacity: "1000"
    cascade-verify/baseline-load: "100"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-0
  template:
    metadata:
      labels:
        app: svc-0
    spec:
      containers:
      - name: svc-0
        image: bench/svc:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
