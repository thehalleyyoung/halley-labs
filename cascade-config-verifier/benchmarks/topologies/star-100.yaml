# CascadeVerify Benchmark — 100-Service Star Topology
#
# Topology: gateway → {backend-1, backend-2, …, backend-99}
# Gateway: 2 retries, 3s per-try timeout, 15s overall
# Amplification: 99 parallel fan-out paths, each with (1+2)=3× amplification
# Combined fan-out load: 99 × 3 = 297× baseline on aggregate backends
#
# Tests fan-out amplification and blast-radius analysis.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: bench-star100
  labels:
    app: gateway
    topology: star-100
    role: gateway
  annotations:
    cascade-verify/capacity: "5000"
    cascade-verify/baseline-load: "500"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: bench/gateway:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-1
  namespace: bench-star100
  labels:
    app: backend-1
    topology: star-100
    role: backend
  annotations:
    cascade-verify/capacity: "200"
    cascade-verify/baseline-load: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-1
  template:
    metadata:
      labels:
        app: backend-1
    spec:
      containers:
      - name: backend-1
        image: bench/backend:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "250m"
            memory: "128Mi"
