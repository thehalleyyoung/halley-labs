# CascadeVerify Benchmark - 500-Service Tiered Mesh Topology
#
# Architecture:
#   Tier 0: 5 gateway services        (gw-0 ... gw-4)
#   Tier 1: 20 API services            (api-0 ... api-19)
#   Tier 2: 50 business logic services  (biz-0 ... biz-49)
#   Tier 3: 100 data services           (data-0 ... data-99)
#   Tier 4: 325 microservices            (micro-0 ... micro-324)
#
# Dependencies:
#   Tier 0 -> Tier 1 (each gateway calls 8 API services)
#   Tier 1 -> Tier 2 (each API calls 5 biz services)
#   Tier 2 -> Tier 3 (each biz calls 4 data services)
#   Tier 3 -> Tier 4 (each data calls 3 microservices)
#   Tier 4: cross-tier deps (~10% call back to Tier 2/3)
#
# Retry/timeout configs vary by tier for realism.
# Tests large-scale analysis with realistic service mesh patterns.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gw-0
  namespace: bench-mesh500
  labels:
    app: gw-0
    topology: mesh-500
    tier: "0"
  annotations:
    cascade-verify/capacity: "5000"
    cascade-verify/baseline-load: "500"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gw-0
  template:
    metadata:
      labels:
        app: gw-0
    spec:
      containers:
      - name: gw-0
        image: bench/gw:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "1Gi"
---
