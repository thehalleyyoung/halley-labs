[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "usability_oracle"
version = "0.1.0"
description = "Bounded-Rational Usability Regression Oracle — information-theoretic cognitive cost analysis for CI/CD"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Bounded-Rational Usability Oracle Team"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Human Machine Interfaces",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "pyyaml>=6.0",
    "lxml>=4.9",
    "html5lib>=1.1",
    "z3-solver>=4.12",
    "networkx>=3.0",
    "click>=8.1",
    "dataclasses-json>=0.6",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "hypothesis>=6.80",
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "mypy>=1.5",
    "ruff>=0.1",
]

[project.scripts]
usability-oracle = "usability_oracle.cli.main:cli"

[tool.setuptools.packages.find]
include = ["usability_oracle*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true

[tool.ruff]
target-version = "py310"
line-length = 100
