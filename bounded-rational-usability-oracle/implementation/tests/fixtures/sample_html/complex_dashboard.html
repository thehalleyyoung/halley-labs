<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Dashboard</title></head>
<body>
  <header role="banner">
    <h1>Analytics Dashboard</h1>
    <nav aria-label="Dashboard navigation">
      <a href="/overview">Overview</a>
      <a href="/reports">Reports</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    <section aria-label="Key Metrics">
      <div role="group" aria-label="Revenue">
        <span>Revenue</span>
        <span aria-live="polite">$1,234,567</span>
      </div>
      <div role="group" aria-label="Users">
        <span>Active Users</span>
        <span aria-live="polite">45,678</span>
      </div>
      <div role="group" aria-label="Conversion">
        <span>Conversion Rate</span>
        <span aria-live="polite">3.2%</span>
      </div>
    </section>
    <section aria-label="Data Table">
      <table aria-label="Monthly Report">
        <thead>
          <tr><th>Month</th><th>Revenue</th><th>Users</th><th>Conversion</th></tr>
        </thead>
        <tbody>
          <tr><td>January</td><td>$100K</td><td>5000</td><td>2.8%</td></tr>
          <tr><td>February</td><td>$120K</td><td>5500</td><td>3.0%</td></tr>
          <tr><td>March</td><td>$115K</td><td>5200</td><td>3.1%</td></tr>
        </tbody>
      </table>
    </section>
    <section aria-label="Controls">
      <label for="date-range">Date Range</label>
      <select id="date-range" aria-label="Date Range">
        <option value="7d">Last 7 Days</option>
        <option value="30d" selected>Last 30 Days</option>
        <option value="90d">Last 90 Days</option>
      </select>
      <button type="button" id="export-btn">Export CSV</button>
      <button type="button" id="refresh-btn">Refresh</button>
    </section>
  </main>
  <footer role="contentinfo">
    <p>Dashboard v2.1 — Last updated 5 min ago</p>
  </footer>
</body>
</html>
