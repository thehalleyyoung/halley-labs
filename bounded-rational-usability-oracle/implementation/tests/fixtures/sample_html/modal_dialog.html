<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Modal</title></head>
<body>
  <main id="main-content" aria-hidden="true">
    <h1>Settings</h1>
    <p>Your account settings are below.</p>
  </main>
  <div role="dialog" aria-modal="true" aria-labelledby="dlg-title"
       style="position:fixed;top:50%;left:50%;width:400px;height:250px;">
    <h2 id="dlg-title">Delete Account?</h2>
    <p>This action cannot be undone. All your data will be permanently removed.</p>
    <div role="group" aria-label="Dialog actions">
      <button type="button" id="confirm-btn" autofocus
              style="width:100px;height:36px;">Delete</button>
      <button type="button" id="cancel-btn"
              style="width:100px;height:36px;">Cancel</button>
    </div>
  </div>
</body>
</html>
