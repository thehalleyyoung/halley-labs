# =============================================================================
# SafeStep Example: Docker Compose Multi-Service Deployment
# =============================================================================
#
# This Docker Compose file defines a six-service application stack commonly
# found in development, staging, and small-scale production environments.
# SafeStep processes Compose files by:
#
#   1. Parsing every service and extracting version information from image
#      tags and "safestep.*" labels.
#   2. Building a dependency graph from `depends_on` declarations.
#   3. Honouring health-check conditions: a service is considered upgraded
#      only when its health check passes, not just when the container starts.
#   4. Generating an ordered `docker compose up` sequence with per-service
#      rollback snapshots.
#
# Usage:
#   safestep compose plan --file docker-compose-upgrade.yaml
#   safestep compose apply --file docker-compose-upgrade.yaml --confirm
#   safestep compose rollback --file docker-compose-upgrade.yaml --step 3
#
# Notes:
#   - SafeStep translates `depends_on` conditions into its own dependency
#     graph, but also reads "safestep.depends-on" labels for additional
#     constraints not expressible via Compose syntax (e.g., version ranges).
#   - The `safestep.current-version` / `safestep.target-version` labels
#     mirror the Kubernetes annotation pattern for a consistent experience.
# =============================================================================

name: ecommerce-platform

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  # Public-facing network for the web and api services
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

  # Internal network for service-to-service and infrastructure traffic
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.1.0/24

# ---------------------------------------------------------------------------
# Volumes — persistent data for stateful services
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # 1. web — Nginx reverse proxy / static asset server
  # -------------------------------------------------------------------------
  # SafeStep processes this as the top-level edge service.  It depends on
  # the api service being healthy before it can route traffic correctly.
  web:
    image: registry.example.com/platform/web-frontend:4.2.0
    container_name: ecommerce-web
    labels:
      safestep.service-name: "web"
      safestep.current-version: "4.1.3"
      safestep.target-version: "4.2.0"
      safestep.depends-on: "api"
      safestep.compatibility: "api>=2.4.0"
      safestep.upgrade-priority: "low"
      safestep.upgrade-strategy: "recreate"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
      - API_UPSTREAM=http://api:8080
      - STATIC_CACHE_TTL=3600
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - frontend
      - backend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # 2. api — primary REST/gRPC application server
  # -------------------------------------------------------------------------
  # SafeStep identifies this as the central service in the graph.  It depends
  # on database, cache, and queue being healthy.  The worker service also
  # depends on api for shared configuration.
  api:
    image: registry.example.com/platform/api-server:2.5.0
    container_name: ecommerce-api
    labels:
      safestep.service-name: "api"
      safestep.current-version: "2.4.1"
      safestep.target-version: "2.5.0"
      safestep.depends-on: "database,cache,queue"
      safestep.compatibility: "database>=15.0,cache>=7.2.0,queue>=3.12.0"
      safestep.upgrade-priority: "medium"
      safestep.upgrade-strategy: "rolling"
      # SafeStep will run this hook after the api container is healthy
      safestep.post-upgrade-hook: "./scripts/run-smoke-tests.sh"
    ports:
      - "8080:8080"
      - "9090:9090"      # metrics
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://app_user:app_pass@database:5432/ecommerce
      - REDIS_URL=redis://cache:6379/0
      - AMQP_URL=amqp://platform_user:platform_pass@queue:5672/ecommerce
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - LOG_LEVEL=info
      - MAX_REQUEST_SIZE=10mb
      - WORKER_CALLBACK_URL=http://worker:8081/callback
    secrets:
      - jwt_secret
    networks:
      - frontend
      - backend
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 2
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # 3. worker — background job processor (order fulfillment, emails, etc.)
  # -------------------------------------------------------------------------
  # SafeStep treats the worker as a sibling to api: same codebase, different
  # entry point.  It must be upgraded at the same time or after api so that
  # message schema versions remain compatible.
  worker:
    image: registry.example.com/platform/api-server:2.5.0
    container_name: ecommerce-worker
    command: ["./app", "worker", "--concurrency", "8"]
    labels:
      safestep.service-name: "worker"
      safestep.current-version: "2.4.1"
      safestep.target-version: "2.5.0"
      safestep.depends-on: "api,database,cache,queue"
      safestep.compatibility: "api>=2.5.0,database>=15.0,cache>=7.2.0,queue>=3.12.0"
      safestep.upgrade-priority: "medium"
      safestep.upgrade-strategy: "stop-first"
      # SafeStep note: worker uses the same image as api.  Upgrading api
      # first ensures the shared database migrations have already run.
      safestep.co-versioned-with: "api"
    ports:
      - "8081:8081"      # callback endpoint
      - "9091:9090"      # metrics
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://app_user:app_pass@database:5432/ecommerce
      - REDIS_URL=redis://cache:6379/0
      - AMQP_URL=amqp://platform_user:platform_pass@queue:5672/ecommerce
      - WORKER_CONCURRENCY=8
      - WORKER_QUEUE=default,orders,notifications
      - LOG_LEVEL=info
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # 4. database — PostgreSQL primary
  # -------------------------------------------------------------------------
  # SafeStep handles database upgrades with extra care:
  #   - Runs `pg_isready` to confirm the new version is accepting connections
  #   - Validates data directory compatibility before starting the new image
  #   - Requires explicit `--allow-data-service-upgrade` flag
  database:
    image: postgres:16.3-alpine
    container_name: ecommerce-db
    labels:
      safestep.service-name: "database"
      safestep.current-version: "15.6"
      safestep.target-version: "16.3"
      safestep.depends-on: ""
      safestep.upgrade-priority: "critical"
      safestep.upgrade-strategy: "stop-first"
      safestep.is-data-service: "true"
      safestep.pre-upgrade-hook: "./scripts/pg-backup.sh"
      safestep.post-upgrade-hook: "./scripts/pg-verify.sh"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ecommerce
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.utf8
      - POSTGRES_MAX_CONNECTIONS=200
      - POSTGRES_SHARED_BUFFERS=256MB
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.d:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped
    shm_size: "256mb"

  # -------------------------------------------------------------------------
  # 5. cache — Redis instance for session and application caching
  # -------------------------------------------------------------------------
  # SafeStep notes: Redis upgrades are generally safe for minor versions.
  # Major version upgrades trigger an RDB snapshot before proceeding.
  cache:
    image: redis:7.4.0-alpine
    container_name: ecommerce-cache
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
      --tcp-backlog 511
    labels:
      safestep.service-name: "cache"
      safestep.current-version: "7.2.4"
      safestep.target-version: "7.4.0"
      safestep.depends-on: ""
      safestep.upgrade-priority: "critical"
      safestep.upgrade-strategy: "stop-first"
      safestep.is-data-service: "true"
      safestep.pre-upgrade-hook: "redis-cli -a ${REDIS_PASSWORD} BGSAVE"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # 6. queue — RabbitMQ message broker
  # -------------------------------------------------------------------------
  # SafeStep treats message brokers similarly to databases: they are data
  # services that require graceful drain of in-flight messages before upgrade.
  queue:
    image: rabbitmq:3.13.3-management-alpine
    container_name: ecommerce-queue
    labels:
      safestep.service-name: "queue"
      safestep.current-version: "3.12.10"
      safestep.target-version: "3.13.3"
      safestep.depends-on: ""
      safestep.upgrade-priority: "critical"
      safestep.upgrade-strategy: "stop-first"
      safestep.is-data-service: "true"
      safestep.pre-upgrade-hook: "rabbitmqctl stop_app && rabbitmqctl reset"
    ports:
      - "5672:5672"        # AMQP
      - "15672:15672"      # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=platform_user
      - RABBITMQ_DEFAULT_PASS_FILE=/run/secrets/rabbitmq_password
      - RABBITMQ_DEFAULT_VHOST=ecommerce
      - RABBITMQ_VM_MEMORY_HIGH_WATERMARK=0.6
      - RABBITMQ_DISK_FREE_LIMIT=1GB
    secrets:
      - rabbitmq_password
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Secrets — referenced by services above
# ---------------------------------------------------------------------------
secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_password:
    file: ./secrets/db_password.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt

# =============================================================================
# SafeStep Computed Upgrade Order (generated by `safestep compose plan`):
#
#   Step 1 — database    15.6    → 16.3     [data-service, stop-first]
#            Pre-hook:  ./scripts/pg-backup.sh
#            Post-hook: ./scripts/pg-verify.sh
#            [checkpoint: pg_isready passes, schema version matches]
#
#   Step 2 — cache       7.2.4   → 7.4.0   [data-service, stop-first]
#            Pre-hook:  BGSAVE
#            [checkpoint: redis PING succeeds]
#
#   Step 3 — queue       3.12.10 → 3.13.3  [data-service, stop-first]
#            Pre-hook:  drain in-flight messages
#            [checkpoint: rabbitmq-diagnostics check_running]
#
#   Step 4 — api         2.4.1   → 2.5.0   [rolling, 2 replicas]
#            Post-hook: ./scripts/run-smoke-tests.sh
#            [checkpoint: /healthz returns 200, smoke tests pass]
#
#   Step 5 — worker      2.4.1   → 2.5.0   [stop-first, co-versioned with api]
#            [checkpoint: /healthz returns 200, queues draining]
#
#   Step 6 — web         4.1.3   → 4.2.0   [recreate]
#            [checkpoint: /health returns 200, end-to-end test]
#
# Estimated total time: ~12 minutes (depending on data service restart times)
# Rollback: safestep compose rollback --file docker-compose-upgrade.yaml --step <N>
# =============================================================================
