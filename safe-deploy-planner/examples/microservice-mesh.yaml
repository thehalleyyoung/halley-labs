# microservice-mesh.yaml
#
# A more complex example with 8 services, version constraints, and
# resource limits for a realistic microservice mesh upgrade.

name: microservice-mesh-example
description: >
  Staged upgrade of an e-commerce microservice mesh.  Services have
  pairwise compatibility constraints and per-step resource budgets.

services:
  - name: api-gateway
    current_version: "3.1.0"
    target_version: "4.0.0"
    schema:
      type: openapi
      path: schemas/api-gateway/openapi.yaml
    resource_cost: 2

  - name: auth-service
    current_version: "2.4.0"
    target_version: "3.0.0"
    schema:
      type: openapi
      path: schemas/auth-service/openapi.yaml
    resource_cost: 1

  - name: user-service
    current_version: "5.0.0"
    target_version: "6.0.0"
    schema:
      type: protobuf
      path: schemas/user-service/user.proto
    resource_cost: 2

  - name: product-catalog
    current_version: "1.2.0"
    target_version: "2.0.0"
    schema:
      type: protobuf
      path: schemas/product-catalog/catalog.proto
    resource_cost: 3

  - name: order-service
    current_version: "4.0.0"
    target_version: "5.0.0"
    schema:
      type: openapi
      path: schemas/order-service/openapi.yaml
    resource_cost: 2

  - name: payment-service
    current_version: "2.0.0"
    target_version: "3.0.0"
    schema:
      type: openapi
      path: schemas/payment-service/openapi.yaml
    resource_cost: 2

  - name: notification-service
    current_version: "1.0.0"
    target_version: "2.0.0"
    schema:
      type: openapi
      path: schemas/notification-service/openapi.yaml
    resource_cost: 1

  - name: search-service
    current_version: "3.0.0"
    target_version: "4.0.0"
    schema:
      type: protobuf
      path: schemas/search-service/search.proto
    resource_cost: 3

dependencies:
  # Gateway depends on most backend services
  - from: api-gateway
    to: auth-service
    constraint:
      type: backward_compatible

  - from: api-gateway
    to: user-service
    constraint:
      type: backward_compatible

  - from: api-gateway
    to: product-catalog
    constraint:
      type: backward_compatible

  - from: api-gateway
    to: order-service
    constraint:
      type: backward_compatible

  - from: api-gateway
    to: search-service
    constraint:
      type: backward_compatible

  # Order service depends on payment and product catalog
  - from: order-service
    to: payment-service
    constraint:
      type: exact_version_match
      description: "order-service v5 requires payment-service v3 for new checkout flow"

  - from: order-service
    to: product-catalog
    constraint:
      type: backward_compatible

  # User service depends on auth
  - from: user-service
    to: auth-service
    constraint:
      type: exact_version_match
      description: "user-service v6 requires auth-service v3 for OIDC support"

  # Notification service depends on user and order
  - from: notification-service
    to: user-service
    constraint:
      type: backward_compatible

  - from: notification-service
    to: order-service
    constraint:
      type: backward_compatible

  # Search depends on product catalog
  - from: search-service
    to: product-catalog
    constraint:
      type: backward_compatible

version_constraints:
  # Hard ordering: auth must be upgraded before user-service
  - type: upgrade_before
    source: auth-service
    target: user-service

  # Hard ordering: payment before order
  - type: upgrade_before
    source: payment-service
    target: order-service

  # Soft preference: upgrade search early to reduce index rebuild window
  - type: prefer_early
    target: search-service
    weight: 5

resource_limits:
  # At most 4 units of resource cost may be in-flight at any single step
  max_concurrent_cost: 4
  # At most 3 services upgrading simultaneously
  max_concurrent_upgrades: 3

options:
  horizon: 12
  k_robustness: 2
  solver: cadical
  timeout_seconds: 120
  output_format: yaml
