# =============================================================================
# SafeStep Example: Helm Chart values.yaml — Microservice Platform
# =============================================================================
#
# This values file configures a Helm chart that deploys an entire microservice
# platform. SafeStep integrates with Helm by reading these values to:
#
#   1. Detect version changes between the currently deployed release and the
#      candidate values (diff against `helm get values <release>`).
#   2. Resolve inter-service compatibility constraints declared in the
#      "safestep" block of each service.
#   3. Generate a safe Helm upgrade plan that respects dependency ordering.
#   4. Optionally wrap `helm upgrade` calls with pre/post health checks.
#
# Usage:
#   safestep helm plan --release ecommerce --chart ./platform-chart \
#       --values helm-values.yaml
#   safestep helm apply --release ecommerce --chart ./platform-chart \
#       --values helm-values.yaml --confirm
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings — shared across all sub-charts and templates
# ---------------------------------------------------------------------------
global:
  # SafeStep reads global.registry to resolve image references
  imageRegistry: registry.example.com/platform
  imagePullPolicy: IfNotPresent
  namespace: production

  # Pull secrets applied to every service account
  imagePullSecrets:
    - name: registry-credentials

  # Shared labels injected into every resource
  labels:
    app.kubernetes.io/part-of: ecommerce-platform
    app.kubernetes.io/managed-by: safestep

  # SafeStep global configuration
  # These settings apply to every service unless overridden per-service
  safestep:
    enabled: true
    rollbackOnFailure: true
    stabilizationWindow: 60s
    healthCheckTimeout: 120s
    notifySlackChannel: "#platform-deploys"

# ---------------------------------------------------------------------------
# Ingress — edge traffic routing
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # SafeStep checks that ingress rules remain valid after upgrades
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service: api-gateway
            port: 8080
        - path: /auth
          pathType: Prefix
          backend:
            service: auth-service
            port: 8080
    - host: admin.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service: admin-dashboard
            port: 3000
  tls:
    - secretName: api-tls-cert
      hosts:
        - api.example.com
    - secretName: admin-tls-cert
      hosts:
        - admin.example.com

# ---------------------------------------------------------------------------
# Service: api-gateway
# ---------------------------------------------------------------------------
api-gateway:
  enabled: true
  image:
    repository: api-gateway
    tag: "2.4.0"              # ← Target version for this upgrade
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  env:
    LOG_LEVEL: info
    REQUEST_TIMEOUT_MS: "30000"
    CIRCUIT_BREAKER_THRESHOLD: "5"
  # SafeStep integration — per-service overrides
  safestep:
    # Compatibility constraints: which versions of dependencies are required
    compatibility:
      auth-service: ">=1.8.0"
      user-service: ">=3.1.0"
      order-service: ">=2.0.0"
    # Dependencies that must be upgraded before this service
    dependsOn:
      - auth-service
      - user-service
      - order-service
    upgradePriority: low       # upgraded last (depends on everything)
    stabilizationWindow: 90s
    healthCheck:
      path: /healthz/ready
      intervalSeconds: 5
      successThreshold: 3

# ---------------------------------------------------------------------------
# Service: auth-service
# ---------------------------------------------------------------------------
auth-service:
  enabled: true
  image:
    repository: auth-service
    tag: "1.9.0"
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilization: 65
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 9000
    metricsPort: 9090
  env:
    TOKEN_EXPIRY_SECONDS: "3600"
    REFRESH_TOKEN_EXPIRY_SECONDS: "604800"
    BCRYPT_ROUNDS: "12"
  secrets:
    - name: auth-secrets
      keys:
        - jwt-signing-key
        - oauth-client-secret
  safestep:
    compatibility:
      user-service: ">=3.0.0"
    dependsOn:
      - user-service
    upgradePriority: high
    stabilizationWindow: 60s
    healthCheck:
      path: /healthz/ready
      intervalSeconds: 5
      successThreshold: 2

# ---------------------------------------------------------------------------
# Service: user-service
# ---------------------------------------------------------------------------
user-service:
  enabled: true
  image:
    repository: user-service
    tag: "3.2.0"
  replicas: 4
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 12
    targetCPUUtilization: 60
  resources:
    requests:
      cpu: 300m
      memory: 384Mi
    limits:
      cpu: 600m
      memory: 768Mi
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  env:
    MAX_CONNECTIONS: "50"
    CACHE_TTL_SECONDS: "300"
    QUERY_TIMEOUT_MS: "5000"
  persistence:
    enabled: true
    storageClass: gp3-encrypted
    size: 20Gi
  safestep:
    compatibility: {}          # leaf service — no upstream dependencies
    dependsOn: []
    upgradePriority: critical  # upgraded first (everyone depends on it)
    stabilizationWindow: 60s
    # SafeStep can run database migration checks before upgrading
    preUpgradeHook:
      command: ["./migrate", "--check", "--dry-run"]
      timeoutSeconds: 120
    healthCheck:
      path: /healthz/ready
      intervalSeconds: 5
      successThreshold: 2

# ---------------------------------------------------------------------------
# Service: order-service
# ---------------------------------------------------------------------------
order-service:
  enabled: true
  image:
    repository: order-service
    tag: "2.1.0"
  replicas: 4
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 16
    targetCPUUtilization: 65
    targetMemoryUtilization: 75
  resources:
    requests:
      cpu: 350m
      memory: 512Mi
    limits:
      cpu: 700m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 9000
    metricsPort: 9090
  env:
    KAFKA_CONSUMER_GROUP: "order-processor"
    ORDER_EVENTS_TOPIC: "order-events"
    FULFILLMENT_TIMEOUT_MS: "60000"
  safestep:
    compatibility:
      user-service: ">=3.0.0"
      payment-service: ">=1.5.0"
    dependsOn:
      - user-service
      - payment-service
    upgradePriority: medium
    stabilizationWindow: 90s
    healthCheck:
      path: /healthz/ready
      intervalSeconds: 5
      successThreshold: 2

# ---------------------------------------------------------------------------
# Service: payment-service
# ---------------------------------------------------------------------------
payment-service:
  enabled: true
  image:
    repository: payment-service
    tag: "1.6.0"
  replicas: 3
  autoscaling:
    enabled: false             # manually scaled for PCI compliance
  resources:
    requests:
      cpu: 300m
      memory: 384Mi
    limits:
      cpu: 600m
      memory: 768Mi
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  env:
    IDEMPOTENCY_TTL_SECONDS: "86400"
    PAYMENT_EVENTS_TOPIC: "payment-events"
    RETRY_MAX_ATTEMPTS: "3"
    RETRY_BACKOFF_MS: "1000"
  secrets:
    - name: payment-provider-keys
      keys:
        - stripe-secret
        - stripe-webhook-secret
  safestep:
    compatibility: {}
    dependsOn: []
    upgradePriority: critical
    stabilizationWindow: 120s  # longer window for financial service
    postUpgradeHook:
      # Verify a test charge succeeds after upgrade
      command: ["./scripts/verify-payment-flow.sh", "--env", "production"]
      timeoutSeconds: 180
    healthCheck:
      path: /healthz/ready
      intervalSeconds: 5
      successThreshold: 3      # extra caution for payment

# ---------------------------------------------------------------------------
# Shared infrastructure — not managed by SafeStep (external dependencies)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: replication
  replica:
    replicaCount: 3
  auth:
    existingSecret: redis-credentials
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: gp3-encrypted
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# ---------------------------------------------------------------------------
# Monitoring — SafeStep feeds deployment events here
# ---------------------------------------------------------------------------
monitoring:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  grafana:
    dashboards:
      safestep:
        enabled: true
        # Auto-provision a SafeStep deployment dashboard in Grafana
        json: safestep-dashboard.json

# =============================================================================
# SafeStep Helm Upgrade Plan (generated by `safestep helm plan`):
#
#   Step 1 — helm upgrade ecommerce ./platform-chart
#            --set user-service.image.tag=3.2.0
#            --reuse-values --wait --timeout 5m
#            [checkpoint: user-service healthy]
#
#   Step 2 — helm upgrade ecommerce ./platform-chart
#            --set payment-service.image.tag=1.6.0
#            --reuse-values --wait --timeout 5m
#            [checkpoint: payment-service healthy, test charge OK]
#
#   Step 3 — helm upgrade ecommerce ./platform-chart
#            --set auth-service.image.tag=1.9.0
#            --reuse-values --wait --timeout 5m
#            [checkpoint: auth-service healthy, token issuance OK]
#
#   Step 4 — helm upgrade ecommerce ./platform-chart
#            --set order-service.image.tag=2.1.0
#            --reuse-values --wait --timeout 5m
#            [checkpoint: order-service healthy]
#
#   Step 5 — helm upgrade ecommerce ./platform-chart
#            --set api-gateway.image.tag=2.4.0
#            --reuse-values --wait --timeout 5m
#            [checkpoint: end-to-end smoke tests via gateway]
#
# Rollback any step: safestep helm rollback --release ecommerce --step <N>
# Full rollback:     safestep helm rollback --release ecommerce --all
# =============================================================================
