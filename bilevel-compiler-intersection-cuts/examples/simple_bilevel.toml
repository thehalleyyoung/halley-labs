# Simple Bilevel LP
#
# Leader minimizes:  -x - 7y
# Subject to:        -2x + y <= 4
#                    y solves follower problem
#
# Follower (given x):
#   minimize  -y
#   subject to:
#     -x + y <= 1
#      x + y <= 5
#          y >= 0
#
# Optimal solution: x = 2, y = 3, leader objective = -23

[problem]
name = "simple_bilevel_lp"
description = "A small bilevel LP from introductory examples (Dempe 2002, §1.2)"
type = "bilevel-lp"

[leader]
objective = "minimize"

[leader.variables]
x = { lower = 0.0, upper = 10.0 }

[leader.objective_coefficients]
x = -1.0
y = -7.0

[[leader.constraints]]
name = "leader_c1"
coefficients = { x = -2.0, y = 1.0 }
sense = "<="
rhs = 4.0

[follower]
objective = "minimize"

[follower.variables]
y = { lower = 0.0, upper = 10.0 }

[follower.objective_coefficients]
y = -1.0

[[follower.constraints]]
name = "follower_c1"
coefficients = { x = -1.0, y = 1.0 }
sense = "<="
rhs = 1.0

[[follower.constraints]]
name = "follower_c2"
coefficients = { x = 1.0, y = 1.0 }
sense = "<="
rhs = 5.0
