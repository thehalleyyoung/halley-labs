[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "caber"
version = "0.1.0"
description = "CABER - Coalgebraic Behavioral Auditing of Foundation Models"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
    "networkx>=3.0",
    "matplotlib>=3.7",
    "scikit-learn>=1.3",
    "pandas>=2.0",
    "rich>=13.0",
    "httpx>=0.25",
    "pydantic>=2.0",
    "tenacity>=8.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "hypothesis>=6.0"]

[tool.setuptools.packages.find]
include = ["caber*"]
